name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint Bicep
        run: |
          az bicep install
          az bicep lint --file infra/main.bicep

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters \
                location="${{ secrets.AZURE_LOCATION }}" \
                planName="${{ secrets.PLAN_NAME }}" \
                keyVaultName="${{ secrets.KEY_VAULT_NAME }}" \
                tenantId="${{ secrets.AZURE_TENANT_ID }}" \
                storageAccountName="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
                appInsightsName="${{ secrets.APP_INSIGHTS_NAME }}" \
                logAnalyticsName="${{ secrets.LOG_ANALYTICS_NAME }}" \
                cosmosAccountName="${{ secrets.COSMOS_ACCOUNT_NAME }}" \
                cosmosDatabaseName="${{ secrets.COSMOS_DATABASE_NAME }}" \
                cosmosDatabaseSharedThroughput="${{ secrets.COSMOS_DATABASE_SHARED_THROUGHPUT != '' && secrets.COSMOS_DATABASE_SHARED_THROUGHPUT || '0' }}" \
                alertEmailAddress="${{ secrets.ALERT_EMAIL }}"
