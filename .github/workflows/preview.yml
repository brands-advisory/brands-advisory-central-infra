name: Preview Infrastructure Changes

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC
  contents: read
  pull-requests: write  # required to post What-If comment

jobs:
  preview:
    name: What-If
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters \
                location="${{ secrets.AZURE_LOCATION }}" \
                planName="${{ secrets.PLAN_NAME }}" \
                keyVaultName="${{ secrets.KEY_VAULT_NAME }}" \
                tenantId="${{ secrets.AZURE_TENANT_ID }}" \
                storageAccountName="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
                appInsightsName="${{ secrets.APP_INSIGHTS_NAME }}" \
                logAnalyticsName="${{ secrets.LOG_ANALYTICS_NAME }}" \
                cosmosAccountName="${{ secrets.COSMOS_ACCOUNT_NAME }}" \
                cosmosDatabaseName="${{ secrets.COSMOS_DATABASE_NAME }}"
